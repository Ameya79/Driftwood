# ═══════════════════════════════════════════════════════════════════════
# Driftwood — Docker Compose (Self-Host)
#
# Usage:
#   1. Copy .env.example → .env
#   2. docker compose up
#   3. Open http://localhost:3000
# ═══════════════════════════════════════════════════════════════════════

version: "3.8"

services:
  # ── FastAPI Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: driftwood-backend
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Next.js Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: driftwood-frontend
    environment:
      - WORKER_URL=http://backend:8000
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Nginx Reverse Proxy ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: driftwood-proxy
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
