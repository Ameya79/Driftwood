events {
    worker_connections 1024;
}

http {
    # Rate limiting: 10MB zone holds ~160k IP addresses.
    # 20 requests/second allows ~100 requests per 5 seconds.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Proxy API requests to FastAPI backend
        location /api/ {
            # Apply rate limiting
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;

            # Strip /api prefix before proxying
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for simulation requests
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # Proxy everything else to Next.js frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Next.js HMR in dev
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
